<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Art-Net Repeater</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #21253a;
    --border: #2a2d3a;
    --text: #e2e4ed;
    --muted: #6b7280;
    --accent: #6366f1;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --bar-bg: #2a2d3a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    line-height: 1.5;
    padding: 20px;
    max-width: 960px;
    margin: 0 auto;
  }

  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .title { font-size: 15px; font-weight: 700; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
  }
  .pill.running { background: #14532d; color: var(--green); }
  .pill.paused  { background: #713f12; color: var(--yellow); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .counters { color: var(--muted); font-size: 12px; }
  .counters span { color: var(--text); }
  .net-info { color: var(--muted); font-size: 11px; }
  .net-info span { color: var(--text); }
  .hz-limit-ctrl { display: flex; align-items: center; color: var(--muted); font-size: 12px; }
  .spacer { flex: 1; }

  /* ── Buttons ── */
  .btn {
    padding: 5px 14px; border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    cursor: pointer; font-family: inherit; font-size: 12px;
    transition: background .12s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #4f52d3; }
  .btn.danger { border-color: #7f1d1d; color: var(--red); }
  .btn.danger:hover { background: #7f1d1d33; }
  .btn.small { padding: 3px 9px; font-size: 11px; }
  .btn.icon { padding: 3px 8px; font-size: 14px; line-height: 1; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 14px;
  }
  .card-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .card-header h2 { flex: 1; }

  /* ── Inputs ── */
  input[type=text], input[type=number], select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 4px 8px;
    outline: none;
    transition: border-color .12s;
  }
  input[type=text]:focus, input[type=number]:focus, select:focus {
    border-color: var(--accent);
  }
  input[type=number] { width: 56px; text-align: center; }
  input[type=text]   { width: 200px; }
  select { cursor: pointer; }

  /* ── Rules ── */
  .rule-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .rule-row1 {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .rule-row2 {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; flex-wrap: wrap; color: var(--muted);
  }
  .rule-row2 input { color: var(--text); }
  .arrow { color: var(--muted); padding: 0 4px; }
  .merge-btn {
    padding: 3px 10px; border-radius: 5px;
    border: 1px solid; cursor: pointer;
    font-family: inherit; font-size: 11px; font-weight: 700;
    transition: all .12s;
  }
  .merge-btn.ltp { background: #1e3a5f; border-color: #1e4a7f; color: #60a5fa; }
  .merge-btn.htp { background: #3b1f5e; border-color: #5b2f8e; color: #c084fc; }
  input[type=number].derived { color: var(--muted); border-style: dashed; cursor: default; }
  .hz-badge {
    padding: 2px 8px; border-radius: 4px;
    font-size: 11px; background: var(--bar-bg); color: var(--muted);
    margin-left: auto;
  }
  .hz-badge.active { color: var(--green); }
  .dirty-badge {
    font-size: 11px; color: var(--yellow);
    margin-left: auto; display: none;
  }
  .save-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 10px;
  }
  #rules-msg { font-size: 12px; }
  #rules-msg.ok  { color: var(--green); }
  #rules-msg.err { color: var(--red); }

  /* ── DMX Viewer ── */
  #dmx-section { display: none; }
  #dmx-section.open { display: block; }
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab {
    padding: 4px 14px; border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    cursor: pointer; font-family: inherit; font-size: 12px;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .channel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 6px;
  }
  .ch-row { display: flex; align-items: center; gap: 8px; }
  .ch-label { color: var(--muted); width: 44px; text-align: right; flex-shrink: 0; }
  .ch-bar-wrap { flex: 1; background: var(--bar-bg); border-radius: 3px; height: 10px; overflow: hidden; }
  .ch-bar { height: 100%; border-radius: 3px; background: var(--accent); transition: width .1s; }
  .ch-val { width: 28px; text-align: right; flex-shrink: 0; }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────── -->
<div class="header">
  <div class="title">Art-Net Repeater</div>
  <div id="status-pill" class="pill running"><div class="dot"></div><span id="status-text">RUNNING</span></div>
  <div class="counters">rx <span id="rx">0</span> &nbsp; tx <span id="tx">0</span></div>
  <div class="net-info"><span id="net-listen">—</span> → <span id="net-target">—</span></div>
  <div class="hz-limit-ctrl">
    Limit&nbsp;<input type="number" id="max-hz-input" placeholder="∞" min="1" max="512"
      style="width:52px" title="Max output framerate (Hz). Leave blank for unlimited."
      onkeydown="if(event.key==='Enter') saveMaxHz()">
    &nbsp;Hz&nbsp;<button class="btn small" onclick="saveMaxHz()">Set</button>
    <span id="max-hz-msg" style="font-size:11px; margin-left:6px;"></span>
  </div>
  <div class="spacer"></div>
  <button class="btn" id="toggle-btn" onclick="togglePause()">Pause</button>
</div>

<!-- ── Rules ───────────────────────────────────────────────────── -->
<div class="card">
  <div class="card-header">
    <h2>Rules</h2>
    <button class="btn small" onclick="addRule()">+ Add Rule</button>
  </div>
  <div id="rules-list"></div>
  <div class="save-row">
    <button class="btn primary" onclick="saveRules()">Save Rules</button>
    <span id="rules-msg"></span>
  </div>
</div>

<!-- ── DMX Viewer ──────────────────────────────────────────────── -->
<div class="card">
  <div class="card-header">
    <h2>DMX Viewer</h2>
    <button class="btn small" id="dmx-toggle-btn" onclick="toggleDmx()">Show</button>
  </div>
  <div id="dmx-section">
    <div class="tabs" id="uni-tabs"></div>
    <div class="channel-grid" id="channel-grid"></div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────
let paused        = false;
let dmxEnabled    = false;
let dirty         = false;      // user has unsaved rule edits
let networkStatus = {};         // {listen, target, max_hz} from last SSE
let latestRules   = [];         // last SSE rules snapshot — used by saveMaxHz
let ruleChannels  = {};         // {universe: Set of 0-indexed channel positions}
let activeUni     = null;
let hzData        = [];         // latest hz values per rule index from SSE

// ── SSE ───────────────────────────────────────────────────────────
const es = new EventSource('/events');
es.onmessage = e => {
  const d = JSON.parse(e.data);
  applyStatus(d);
  if (!dirty) applyRules(d.rules);
  else        applyHz(d.rules);   // keep Hz badges fresh even while editing
  if (dmxEnabled && d.levels) applyLevels(d.levels, d.rules);
};

// ── Status ────────────────────────────────────────────────────────
function applyStatus(d) {
  paused = d.paused;
  networkStatus = { listen: d.listen, target: d.target, max_hz: d.max_hz };

  // Sync the limit input only when the user isn't actively editing it
  const inp = document.getElementById('max-hz-input');
  if (inp && document.activeElement !== inp) {
    inp.value = d.max_hz != null ? d.max_hz : '';
  }

  const pill = document.getElementById('status-pill');
  document.getElementById('status-text').textContent = d.paused ? 'PAUSED' : 'RUNNING';
  pill.className = 'pill ' + (d.paused ? 'paused' : 'running');
  document.getElementById('toggle-btn').textContent = d.paused ? 'Resume' : 'Pause';
  document.getElementById('rx').textContent = d.rx.toLocaleString();
  document.getElementById('tx').textContent = d.tx.toLocaleString();
  document.getElementById('net-listen').textContent = d.listen || '—';
  document.getElementById('net-target').textContent = d.target || '—';
}

// ── Rules form ────────────────────────────────────────────────────
function applyRules(rules) {
  latestRules = rules;
  hzData = rules.map(r => r.hz);
  const list = document.getElementById('rules-list');

  // Rebuild only if rule count changed (avoid clobbering inputs on every tick)
  if (list.children.length !== rules.length) {
    list.innerHTML = '';
    rules.forEach((r, i) => list.appendChild(makeRuleCard(r, i)));
  } else {
    // Just refresh Hz badges
    applyHz(rules);
  }
}

function applyHz(rules) {
  hzData = rules.map(r => r.hz);
  rules.forEach((r, i) => {
    const badge = document.getElementById(`hz-${i}`);
    if (badge) {
      badge.textContent = r.hz > 0 ? r.hz.toFixed(0) + ' Hz' : '—';
      badge.className = 'hz-badge' + (r.hz > 0 ? ' active' : '');
    }
  });
}

function makeRuleCard(r, i) {
  const card = document.createElement('div');
  card.className = 'rule-card';
  card.id = `rule-${i}`;
  card.innerHTML = `
    <div class="rule-row1">
      <input type="text" id="rname-${i}" value="${esc(r.name)}" placeholder="Rule name"
             style="flex:1; min-width:160px;" oninput="markDirty()">
      <button class="merge-btn ${r.merge}" id="merge-${i}" onclick="toggleMerge(${i})">
        ${r.merge.toUpperCase()}
      </button>
      <span class="hz-badge${r.hz > 0 ? ' active' : ''}" id="hz-${i}">
        ${r.hz > 0 ? r.hz.toFixed(0) + ' Hz' : '—'}
      </span>
      <button class="btn icon danger" onclick="removeRule(${i})" title="Remove rule">✕</button>
    </div>
    <div class="rule-row2">
      From&nbsp;U<input type="number" id="rsu-${i}" value="${r.src_u}" min="0" max="32767"
                         oninput="markDirty()" title="Source universe">
      ch<input type="number" id="rsc1-${i}" value="${r.src_ch[0]}" min="1" max="512"
               oninput="syncDstEnd(${i})" title="First source channel">
      –<input type="number" id="rsc2-${i}" value="${r.src_ch[1]}" min="1" max="512"
               oninput="syncDstEnd(${i})" title="Last source channel">
      <span class="arrow">→</span>
      To&nbsp;U<input type="number" id="rdu-${i}" value="${r.dst_u}" min="0" max="32767"
                       oninput="markDirty()" title="Destination universe">
      ch<input type="number" id="rdc1-${i}" value="${r.dst_ch[0]}" min="1" max="512"
               oninput="syncDstEnd(${i})" title="First destination channel">
      –<input type="number" id="rdc2-${i}" value="${r.dst_ch[1]}" min="1" max="512"
               class="derived" readonly title="Auto: dst start + source length − 1">
      &nbsp;<input type="text" id="rtgt-${i}" value="${esc(r.target_ip || '')}"
             placeholder="global target" style="width:130px; color: ${r.target_ip ? 'var(--text)' : 'var(--muted)'}"
             oninput="markDirty()" title="Unicast target IP for this rule (leave blank to use global)">
    </div>`;
  return card;
}

function toggleMerge(i) {
  const btn = document.getElementById(`merge-${i}`);
  const isLtp = btn.classList.contains('ltp');
  btn.classList.toggle('ltp', !isLtp);
  btn.classList.toggle('htp', isLtp);
  btn.textContent = isLtp ? 'HTP' : 'LTP';
  markDirty();
}

function addRule() {
  const i = document.getElementById('rules-list').children.length;
  const r = { name: 'New rule', src_u: 0, src_ch: [1, 1], dst_u: 0, dst_ch: [1, 1], merge: 'ltp', hz: 0 };
  document.getElementById('rules-list').appendChild(makeRuleCard(r, i));
  markDirty();
}

function removeRule(i) {
  const card = document.getElementById(`rule-${i}`);
  if (card) card.remove();
  // Re-index remaining cards
  const list = document.getElementById('rules-list');
  [...list.children].forEach((c, j) => {
    c.id = `rule-${j}`;
    c.querySelectorAll('[id]').forEach(el => {
      el.id = el.id.replace(/-\d+$/, `-${j}`);
    });
    // Fix onclick references
    c.querySelector('.merge-btn').setAttribute('onclick', `toggleMerge(${j})`);
    c.querySelector('.btn.danger').setAttribute('onclick', `removeRule(${j})`);
  });
  markDirty();
}

function markDirty() {
  dirty = true;
  const msg = document.getElementById('rules-msg');
  msg.textContent = 'Unsaved changes';
  msg.className = '';
  msg.style.color = 'var(--yellow)';
}

function syncDstEnd(i) {
  const sc1 = parseInt(document.getElementById(`rsc1-${i}`)?.value) || 1;
  const sc2 = parseInt(document.getElementById(`rsc2-${i}`)?.value) || 1;
  const dc1 = parseInt(document.getElementById(`rdc1-${i}`)?.value) || 1;
  const len = Math.max(1, sc2 - sc1 + 1);          // source channel count
  const dc2El = document.getElementById(`rdc2-${i}`);
  if (dc2El) dc2El.value = Math.min(512, dc1 + len - 1);
  markDirty();
}

function getRulesFromForm() {
  const list = document.getElementById('rules-list');
  return [...list.children].map((c, i) => ({
    name:   document.getElementById(`rname-${i}`)?.value || '',
    src_u:  parseInt(document.getElementById(`rsu-${i}`)?.value  || 0),
    src_ch: [parseInt(document.getElementById(`rsc1-${i}`)?.value || 1),
             parseInt(document.getElementById(`rsc2-${i}`)?.value || 1)],
    dst_u:  parseInt(document.getElementById(`rdu-${i}`)?.value  || 0),
    dst_ch: [parseInt(document.getElementById(`rdc1-${i}`)?.value || 1),
             parseInt(document.getElementById(`rdc2-${i}`)?.value || 1)],
    merge:     document.getElementById(`merge-${i}`)?.classList.contains('htp') ? 'htp' : 'ltp',
    target_ip: document.getElementById(`rtgt-${i}`)?.value.trim() || null,
  }));
}

function buildToml(rules, maxHz) {
  const [listenIp, port] = (networkStatus.listen || '0.0.0.0:6454').split(':');
  let t = `[network]\n`;
  t += `listen_ip   = "${listenIp}"\n`;
  t += `target_ip   = "${networkStatus.target || 'broadcast'}"\n`;
  t += `artnet_port = ${port || 6454}\n`;
  if (maxHz != null && maxHz > 0) t += `max_hz      = ${maxHz}\n`;
  for (const r of rules) {
    t += `\n[[rules]]\n`;
    t += `name         = "${r.name.replace(/\\/g,'\\\\').replace(/"/g,'\\"')}"\n`;
    t += `src_universe = ${r.src_u}\n`;
    t += `src_channels = [${r.src_ch[0]}, ${r.src_ch[1]}]\n`;
    t += `dst_universe = ${r.dst_u}\n`;
    t += `dst_channels = [${r.dst_ch[0]}, ${r.dst_ch[1]}]\n`;
    t += `merge        = "${r.merge}"\n`;
    if (r.target_ip) t += `target_ip    = "${r.target_ip}"\n`;
  }
  return t;
}

function currentMaxHz() {
  const v = parseFloat(document.getElementById('max-hz-input')?.value);
  return isNaN(v) || v <= 0 ? null : v;
}

function saveRules() {
  const rules = getRulesFromForm();
  const toml  = buildToml(rules, currentMaxHz());
  const msg   = document.getElementById('rules-msg');
  msg.textContent = 'Saving…'; msg.className = ''; msg.style.color = 'var(--muted)';

  fetch('/config', { method: 'POST', body: toml, headers: { 'Content-Type': 'text/plain' } })
    .then(async r => {
      const body = await r.text();
      if (r.ok) {
        msg.textContent = 'Saved.'; msg.className = 'ok'; msg.style.color = '';
        dirty = false;
      } else {
        msg.textContent = 'Error: ' + body; msg.className = 'err'; msg.style.color = '';
      }
    })
    .catch(() => { msg.textContent = 'Network error'; msg.className = 'err'; msg.style.color = ''; });
}

function saveMaxHz() {
  const maxHz = currentMaxHz();
  // Build TOML using the latest SSE rule snapshot (avoids requiring the rules form to be open)
  const rules = latestRules.map(r => r);
  const toml  = buildToml(rules, maxHz);
  const msg   = document.getElementById('max-hz-msg');
  msg.textContent = 'Saving…'; msg.style.color = 'var(--muted)';

  fetch('/config', { method: 'POST', body: toml, headers: { 'Content-Type': 'text/plain' } })
    .then(async r => {
      const body = await r.text();
      msg.textContent = r.ok ? (maxHz ? `Set to ${maxHz} Hz` : 'Unlimited') : 'Error: ' + body;
      msg.style.color = r.ok ? 'var(--green)' : 'var(--red)';
      setTimeout(() => { msg.textContent = ''; }, 3000);
    })
    .catch(() => { msg.textContent = 'Network error'; msg.style.color = 'var(--red)'; });
}

// ── Pause / Resume ────────────────────────────────────────────────
function togglePause() {
  fetch('/control', {
    method: 'POST',
    body: JSON.stringify({ action: paused ? 'resume' : 'pause' }),
    headers: { 'Content-Type': 'application/json' }
  });
}

// ── DMX Viewer ────────────────────────────────────────────────────
function toggleDmx() {
  fetch('/levels', { method: 'POST' })
    .then(r => r.json())
    .then(({ enabled }) => {
      dmxEnabled = enabled;
      const section = document.getElementById('dmx-section');
      const btn     = document.getElementById('dmx-toggle-btn');
      section.classList.toggle('open', enabled);
      btn.textContent = enabled ? 'Hide' : 'Show';
      if (!enabled) document.getElementById('channel-grid').innerHTML = '';
    });
}

function applyLevels(levels, rules) {
  // Build rule-channel sets
  ruleChannels = {};
  for (const r of (rules || [])) {
    const add = (uni, f, l) => {
      if (!ruleChannels[uni]) ruleChannels[uni] = new Set();
      for (let i = f - 1; i < l; i++) ruleChannels[uni].add(i);
    };
    add(r.src_u, r.src_ch[0], r.src_ch[1]);
    add(r.dst_u, r.dst_ch[0], r.dst_ch[1]);
  }

  const unis = Object.keys(ruleChannels).map(Number).sort((a,b)=>a-b);
  updateTabs(unis);

  if (activeUni !== null && levels[String(activeUni)]) {
    updateBars(levels[String(activeUni)], ruleChannels[activeUni] || new Set());
  }
}

function updateTabs(unis) {
  const container = document.getElementById('uni-tabs');
  if (activeUni === null && unis.length > 0) activeUni = unis[0];
  const existing = [...container.querySelectorAll('.tab')].map(b => Number(b.dataset.uni));
  if (JSON.stringify(existing) === JSON.stringify(unis)) {
    container.querySelectorAll('.tab').forEach(b =>
      b.className = 'tab' + (Number(b.dataset.uni) === activeUni ? ' active' : ''));
    return;
  }
  container.innerHTML = '';
  unis.forEach(u => {
    const b = document.createElement('button');
    b.className = 'tab' + (u === activeUni ? ' active' : '');
    b.textContent = `Universe ${u}`;
    b.dataset.uni = u;
    b.onclick = () => { activeUni = u; updateTabs(unis); };
    container.appendChild(b);
  });
}

function updateBars(levels, channels) {
  const grid  = document.getElementById('channel-grid');
  const chArr = [...channels].sort((a,b) => a-b);
  while (grid.children.length > chArr.length) grid.removeChild(grid.lastChild);
  while (grid.children.length < chArr.length) {
    const row = document.createElement('div');
    row.className = 'ch-row';
    row.innerHTML = `<div class="ch-label"></div>
      <div class="ch-bar-wrap"><div class="ch-bar"></div></div>
      <div class="ch-val"></div>`;
    grid.appendChild(row);
  }
  chArr.forEach((ci, i) => {
    const val = levels[ci] || 0;
    const row = grid.children[i];
    row.querySelector('.ch-label').textContent = `ch${ci+1}`;
    row.querySelector('.ch-bar').style.width = (val / 255 * 100).toFixed(1) + '%';
    row.querySelector('.ch-val').textContent = val;
  });
}

// ── Helpers ───────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}
</script>
</body>
</html>
